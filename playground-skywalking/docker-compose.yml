version: '3.8'

services:
  oap:
    image: apache/skywalking-oap-server:10.1.0
    environment:
      SW_STORAGE: h2
    ports:
      - "11800:11800"
      - "12800:12800"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12800/internal/l7check || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ui:
    image: apache/skywalking-ui:10.1.0
    environment:
      SW_OAP_ADDRESS: http://oap:12800
    ports:
      - "8090:8080"
    depends_on:
      oap:
        condition: service_healthy

  order-service:
    build: ./order-service
    environment:
      SERVICE_NAME: order-service
      OAP_HOST: oap
      PRODUCT_SERVICE_URL: http://product-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
    ports:
      - "8080:8080"
    depends_on:
      oap:
        condition: service_healthy

  product-service:
    build: ./product-service
    environment:
      SERVICE_NAME: product-service
      OAP_HOST: oap
    ports:
      - "8081:8081"
    depends_on:
      oap:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    environment:
      SERVICE_NAME: payment-service
      OAP_HOST: oap
    ports:
      - "8082:8082"
    depends_on:
      oap:
        condition: service_healthy
