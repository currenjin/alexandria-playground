services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skywalking
    ports:
      - "3306:3306"
    command:
      - --general-log=1
      - --general-log-file=/var/lib/mysql/general.log
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  oap:
    image: apache/skywalking-oap-server:10.1.0
    environment:
      SW_STORAGE: mysql
      SW_JDBC_URL: jdbc:mysql://mysql:3306/skywalking?rewriteBatchedStatements=true&allowMultiQueries=true
      SW_DATA_SOURCE_USER: root
      SW_DATA_SOURCE_PASSWORD: root
    ports:
      - "11800:11800"
      - "12800:12800"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST -H 'Content-Type: application/json' -d '{\"query\":\"{ version }\"}' http://localhost:12800/graphql || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  ui:
    image: apache/skywalking-ui:10.1.0
    environment:
      SW_OAP_ADDRESS: http://oap:12800
    ports:
      - "8090:8080"
    depends_on:
      oap:
        condition: service_healthy

  order-service:
    build: ./order-service
    environment:
      SERVICE_NAME: order-service
      OAP_HOST: oap
      PRODUCT_SERVICE_URL: http://product-service:8081
      PAYMENT_SERVICE_URL: http://payment-service:8082
    ports:
      - "8080:8080"
    depends_on:
      oap:
        condition: service_healthy

  product-service:
    build: ./product-service
    environment:
      SERVICE_NAME: product-service
      OAP_HOST: oap
    ports:
      - "8081:8081"
    depends_on:
      oap:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    environment:
      SERVICE_NAME: payment-service
      OAP_HOST: oap
    ports:
      - "8082:8082"
    depends_on:
      oap:
        condition: service_healthy
