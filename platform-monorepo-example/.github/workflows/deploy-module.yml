name: deploy-module
on:
  push:
    tags: ['*/v*']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: echo "MODULE=${GITHUB_REF_NAME%%/*}" >> $GITHUB_ENV   # oms/v1.2.0 -> oms
      - run: ./gradlew :${MODULE}:backend:bootJar
