# 토픽 카탈로그 (§7.1.2) — as-code 선언, 공통 소유. 모든 서비스가 spring.config.import로 임포트.
# 도메인/커맨드 토픽 = 파티션 12·리텐션 7일, DLT = 리텐션 30일(§7.1.6 미해결 실패 보존).
# 운영 클러스터는 auto-create=off (docker-compose의 KAFKA_AUTO_CREATE_TOPICS_ENABLE=false).
platform:
  events:
    topics:
      # 도메인 이벤트 토픽 (발행자=애그리거트 소유)
      - { name: oms.order,          partitions: 12, retention-ms: 604800000 }
      - { name: tms.dispatch,       partitions: 12, retention-ms: 604800000 }
      - { name: bms.settlement,     partitions: 12, retention-ms: 604800000 }
      # 커맨드 토픽 (orchestrator → 참여자). TMS는 자기 API로 행위(publish-only)라 tms.cmd 없음.
      - { name: oms.cmd,            partitions: 12, retention-ms: 604800000 }
      - { name: bms.cmd,            partitions: 12, retention-ms: 604800000 }
      # DLT (소비되는 토픽마다, 30일 보존)
      - { name: oms.order.DLT,      partitions: 12, retention-ms: 2592000000 }
      - { name: tms.dispatch.DLT,       partitions: 12, retention-ms: 2592000000 }
      - { name: bms.settlement.DLT, partitions: 12, retention-ms: 2592000000 }
      - { name: oms.cmd.DLT,        partitions: 12, retention-ms: 2592000000 }
      - { name: bms.cmd.DLT,        partitions: 12, retention-ms: 2592000000 }
