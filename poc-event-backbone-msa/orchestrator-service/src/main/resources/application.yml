spring:
  config:
    import: "classpath:event-topics.yml"   # §7.1.2 공통 토픽 카탈로그(as-code)
  application: { name: orchestrator-service }
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orchestrator}
    username: ${DB_USER:ebe}
    password: ${DB_PASSWORD:ebe}
  kafka:
    bootstrap-servers: ${KAFKA:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties: { enable.idempotence: true }

server:
  port: ${PORT:8083}

platform:
  events:
    consumer-group: saga
    subscribe-topics: "oms.order,tms.trip,bms.settlement"
    relay: { poll-interval-ms: 200, batch-size: 500 }
    retry: { max-attempts: 3, backoff-ms: 1000 }
    saga:  { timeout-scan-ms: 1000, step-timeout-ms: 30000, max-step-retries: 2 }

logging:
  level: { com.wemeet.eventbackbone: DEBUG }
