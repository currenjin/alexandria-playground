spring:
  application: { name: oms-service }
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/oms}
    username: ${DB_USER:ebe}
    password: ${DB_PASSWORD:ebe}
  kafka:
    bootstrap-servers: ${KAFKA:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties: { enable.idempotence: true }

server:
  port: ${PORT:8080}

platform:
  context: { default-tenant-id: dongsuh, default-corp-id: DS-GRP }   # 데모용 기본 테넌트 — 라이브러리 아닌 이 앱이 소유
  events:
    consumer-group: oms
    subscribe-topics: "oms.cmd"
    # 이 서비스가 소유·생성하는 토픽 (§7.1.2 발행자 소유). 도메인·커맨드=7일, DLT=30일.
    topics:
      - { name: oms.order,     partitions: 12, retention-ms: 604800000 }
      - { name: oms.cmd,       partitions: 12, retention-ms: 604800000 }
      - { name: oms.order.DLT, partitions: 12, retention-ms: 2592000000 }
      - { name: oms.cmd.DLT,   partitions: 12, retention-ms: 2592000000 }
    relay: { poll-interval-ms: 200, batch-size: 500 }
    retry: { max-attempts: 3, backoff-ms: 1000 }

logging:
  level: { com.wemeet.eventbackbone: DEBUG }
