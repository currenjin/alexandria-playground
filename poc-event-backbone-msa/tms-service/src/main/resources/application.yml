spring:
  config:
    import: "classpath:event-topics.yml"   # §7.1.2 공통 토픽 카탈로그(as-code)
  application: { name: tms-service }
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tms}
    username: ${DB_USER:ebe}
    password: ${DB_PASSWORD:ebe}
  kafka:
    bootstrap-servers: ${KAFKA:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties: { enable.idempotence: true }

server:
  port: ${PORT:8081}

platform:
  events:
    # TMS는 주로 자기 API로 행위(사실 발행)하되, 사가 보상 커맨드(CancelDispatch)만 tms.cmd로 소비한다.
    consumer-group: tms
    subscribe-topics: "tms.cmd"
    relay: { poll-interval-ms: 200, batch-size: 500 }
    retry: { max-attempts: 3, backoff-ms: 1000 }

logging:
  level: { com.wemeet.eventbackbone: DEBUG }
