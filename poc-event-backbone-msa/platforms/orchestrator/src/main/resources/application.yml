spring:
  application: { name: orchestrator-service }
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orchestrator}
    username: ${DB_USER:ebe}
    password: ${DB_PASSWORD:ebe}
  kafka:
    bootstrap-servers: ${KAFKA:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties: { enable.idempotence: true }

server:
  port: ${PORT:8083}

platform:
  events:
    # 오케스트레이터(사가)는 소유·생성하는 토픽이 없다. 타 서비스의 도메인 토픽(oms.order·tms.dispatch·
    # bms.settlement)을 구독하고, 커맨드는 각 서비스 소유의 *.cmd 토픽으로 발행할 뿐이라 생성 책임은 소유 서비스에 있다.
    consumer-group: saga
    subscribe-topics: "oms.order,tms.dispatch,bms.settlement"
    relay: { poll-interval-ms: 200, batch-size: 500 }
    retry: { max-attempts: 3, backoff-ms: 1000 }
    saga:  { timeout-scan-ms: 1000, step-timeout-ms: 30000, max-step-retries: 2 }

logging:
  level: { com.wemeet.eventbackbone: DEBUG }
