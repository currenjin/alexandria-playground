// 중앙 사가(프로세스 매니저). 부팅 앱 — spring-boot 플러그인은 root 앱 그룹에서 적용.
dependencies {
    implementation project(':platforms:core')   // 사가 엔진(common.saga)·공통 인프라 포함
    implementation project(':platforms:contract')   // 이벤트 계약 record (예제)
    implementation 'org.springframework.boot:spring-boot-starter-web'   // 데모 사가 상태 조회
    implementation 'org.springframework.boot:spring-boot-starter-jdbc'
    implementation 'org.springframework.kafka:spring-kafka'
    implementation 'org.flywaydb:flyway-core'
    implementation 'org.flywaydb:flyway-database-postgresql'
    runtimeOnly 'org.postgresql:postgresql'

    // 사가 단위 테스트 — 발행 더블(FakeEventPublisher)로 무상태 사가의 반응만 검증.
    // (JUnit5·AssertJ·Mockito·launcher는 root subprojects 공통)
    testImplementation testFixtures(project(':platforms:core'))
}
