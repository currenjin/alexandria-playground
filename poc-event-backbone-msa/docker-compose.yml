# MSA 한 방 실행: docker compose up --build
# Kafka(KRaft) + PostgreSQL(5 DB: oms/tms/bms/orchestrator/ems) + 독립 배포 서비스 5개.
services:
  kafka:
    image: apache/kafka:3.8.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # 운영 스펙: 토픽은 카탈로그(as-code)로만 생성

  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: ebe
      POSTGRES_PASSWORD: ebe
      POSTGRES_DB: ebe
    volumes:
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

  orchestrator-service:
    build: { context: ., args: { MODULE: platforms/orchestrator } }
    ports: ["8083:8083"]
    depends_on: [kafka, postgres]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/orchestrator
      KAFKA: kafka:29092
      PORT: 8083

  oms-service:
    build: { context: ., args: { MODULE: services/oms } }
    ports: ["8080:8080"]
    depends_on: [kafka, postgres]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/oms
      KAFKA: kafka:29092
      PORT: 8080

  tms-service:
    build: { context: ., args: { MODULE: services/tms } }
    ports: ["8081:8081"]
    depends_on: [kafka, postgres]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/tms
      KAFKA: kafka:29092
      PORT: 8081

  bms-service:
    build: { context: ., args: { MODULE: services/bms } }
    depends_on: [kafka, postgres]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/bms
      KAFKA: kafka:29092
      PORT: 8082

  ems-service:
    build: { context: ., args: { MODULE: services/ems } }
    ports: ["8084:8084"]
    depends_on: [kafka, postgres]
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ems
      KAFKA: kafka:29092
      PORT: 8084
